name: update

on:
  schedule:
    - cron: "23 5 * * 1,4"   # twice a week, Monday and Thursday 05:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ${{ fromJSON(vars.RUNNER || '"ubuntu-latest"') }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Probe all entries
        run: uv run freetier-probe --registry registry.yaml --failures failures

      - name: Render README
        run: uv run freetier-render --registry registry.yaml --templates templates --out README.md

      - name: Commit verification results to main
        run: |
          git config user.name "freetier-bot"
          git config user.email "freetier-bot@users.noreply.github.com"
          git add registry.yaml README.md
          git diff --staged --quiet || git commit -m "chore: verification $(date -u +%F)"
          git push

      - name: Scout (web discovery + LLM proposals)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOUT_BASE_URL: ${{ vars.SCOUT_BASE_URL }}
          SCOUT_MODEL: ${{ vars.SCOUT_MODEL }}
          SCOUT_API_KEY: ${{ secrets.SCOUT_API_KEY }}
        run: uv run freetier-scout --registry registry.yaml --failures failures/failures.json --pr-body scout-pr.md

      - name: Render README with scout changes
        run: uv run freetier-render --registry registry.yaml --templates templates --out README.md

      - name: Open scout PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: scout/weekly
          delete-branch: true
          title: "scout: registry proposals"
          body-path: scout-pr.md
          labels: scout
