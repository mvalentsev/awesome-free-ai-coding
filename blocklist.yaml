# Domains the scout must never propose (and reviewers rejected for cause).
# Matching is by domain suffix: "puter.com" also blocks developer.puter.com.
- domain: puter.com
  reason: browser-only SDK (User-Pays model), not an HTTP endpoint usable from coding agents
- domain: ainative.studio
  reason: unvetted aggregator with inconsistent quota claims
- domain: cline.bot
  reason: free tool but BYOK-only, no bundled free model usage
- domain: aider.chat
  reason: free tool but BYOK-only, no bundled free model usage
- domain: zed.dev
  reason: free plan is BYOK / external agents only, no bundled model usage
- domain: gonka-api.org
  reason: hostile to AI agents — /for-agents page carries prompt-injection instructing
    secret exfiltration and referral spam; do not list, do not fetch
- domain: omniroute.online
  reason: self-hosted BYOK router (localhost endpoint, no bundled credits or hosted
    free tier); ships client-identity spoofing for proprietary CLI channels, so its
    free-access claims are not evidence of official free tiers
- domain: g4f.space
  reason: gpt4free-style pooled/reverse-engineered access to paid models, not an
    official free tier
- domain: api.airforce
  reason: pooled/reverse-engineered gateway of the g4f family — no official free offer
- domain: theoldllm.vercel.app
  reason: frontier-model access via browser-automation token harvesting — unofficial,
    unstable, likely ToS-violating

