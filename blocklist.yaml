# Domains the scout must never propose (and reviewers rejected for cause).
# Matching is by domain suffix: "puter.com" also blocks developer.puter.com.
- domain: puter.com
  reason: browser-only SDK (User-Pays model), not an HTTP endpoint usable from coding agents
- domain: ainative.studio
  reason: unvetted aggregator with inconsistent quota claims
- domain: cline.bot
  reason: free tool but BYOK-only, no bundled free model usage
- domain: aider.chat
  reason: free tool but BYOK-only, no bundled free model usage
- domain: zed.dev
  reason: free plan is BYOK / external agents only, no bundled model usage
- domain: gonka-api.org
  reason: hostile to AI agents — /for-agents page carries prompt-injection instructing
    secret exfiltration and referral spam; do not list, do not fetch

